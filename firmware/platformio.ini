[platformio]
default_envs = xiao_esp32s3_gateway

[env]
platform = espressif32
framework = arduino
board = seeed_xiao_esp32s3
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  jgromes/RadioLib @ ^6.6.0
  knolleary/PubSubClient @ ^2.8
  tzapu/WiFiManager @ ^2.0.17
  bblanchon/ArduinoJson @ ^7.1.0
build_flags =
  -D CORE_DEBUG_LEVEL=1
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

[env:xiao_esp32s3_sensor]
extends = env
build_flags =
  ${env.build_flags}
  -D APP_ROLE_SENSOR=1
  -D APP_NODE_ID=1001
  -D APP_TX_INTERVAL_SEC=300
build_src_filter = +<sensor_node.cpp> +<*> -<gateway_node.cpp> -<distance_node.cpp>

[env:xiao_esp32s3_gateway]
extends = env
build_flags =
  ${env.build_flags}
  -D APP_ROLE_GATEWAY=1
build_src_filter = +<gateway_node.cpp> +<*> -<sensor_node.cpp> -<distance_node.cpp>

[env:xiao_esp32s3_distance_node]
extends = env
build_flags =
  ${env.build_flags}
  -D APP_ROLE_DISTANCE_NODE=1
  -D DISTANCE_NODE_ID=2001
  -D DISTANCE_TX_INTERVAL_SEC=300
build_src_filter = +<distance_node.cpp> +<*> -<sensor_node.cpp> -<gateway_node.cpp>
