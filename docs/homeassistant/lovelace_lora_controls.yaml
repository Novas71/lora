title: LoRa Node Controls
type: vertical-stack
cards:
  - type: entities
    title: LoRa Target
    show_header_toggle: false
    entities:
      - entity: input_text.lora_target_node_id
        name: Node ID
      - entity: input_number.lora_target_interval_sec
        name: Interval (sec)
      - entity: input_number.lora_ota_window_sec
        name: OTA Window (sec)
      - entity: input_number.lora_tank_area_m2
        name: Tank area (m²)
      - entity: input_number.lora_tank_min_mm
        name: Tank min distance (mm)
      - entity: input_number.lora_tank_max_mm
        name: Tank max distance (mm)

  - type: horizontal-stack
    cards:
      - type: button
        name: Ping
        icon: mdi:wifi-check
        tap_action:
          action: call-service
          service: script.lora_ping_node
      - type: button
        name: Set Interval
        icon: mdi:timer-cog
        tap_action:
          action: call-service
          service: script.lora_set_interval_node
      - type: button
        name: Reboot
        icon: mdi:restart
        tap_action:
          action: call-service
          service: script.lora_reboot_node

  - type: button
    name: Enter OTA Mode
    icon: mdi:upload-network
    tap_action:
      action: call-service
      service: script.lora_enter_ota_node

  - type: horizontal-stack
    cards:
      - type: button
        name: Set Tank Area
        icon: mdi:vector-square
        tap_action:
          action: call-service
          service: script.lora_set_tank_area
      - type: button
        name: Set Tank Min
        icon: mdi:arrow-collapse-down
        tap_action:
          action: call-service
          service: script.lora_set_tank_min_mm
      - type: button
        name: Set Tank Max
        icon: mdi:arrow-collapse-up
        tap_action:
          action: call-service
          service: script.lora_set_tank_max_mm

  - type: entities
    title: Tank Metrics (example node 2001)
    show_header_toggle: false
    entities:
      - entity: sensor.lora_2001_distance_cm
        name: Distance (cm)
      - entity: sensor.lora_2001_level_cm
        name: Water level (cm)
      - entity: sensor.lora_2001_water_l
        name: Water volume (L)

  - type: entities
    title: Last ACK (from MQTT)
    show_header_toggle: false
    entities:
      - entity: sensor.lora_last_ack
        name: ACK status
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: node_id
        name: Node ID
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: acked_fcnt
        name: Acked FCNT
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: cmd
        name: Command
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: status
        name: Status
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: interval_sec
        name: Interval sec
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: rssi
        name: RSSI
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: snr
        name: SNR
