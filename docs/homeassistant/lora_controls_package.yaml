input_text:
  lora_target_node_id:
    name: LoRa Target Node ID
    initial: "2001"
    max: 10

input_number:
  lora_target_interval_sec:
    name: LoRa Target Interval (sec)
    min: 30
    max: 86400
    step: 10
    mode: box
    initial: 300
  lora_ota_window_sec:
    name: LoRa OTA Window (sec)
    min: 60
    max: 3600
    step: 30
    mode: box
    initial: 300
  lora_tank_area_m2:
    name: LoRa Tank Area (m2)
    min: 0.1
    max: 200.0
    step: 0.1
    mode: box
    initial: 1.0
  lora_tank_min_mm:
    name: LoRa Tank Min Distance (mm)
    min: 10
    max: 10000
    step: 10
    mode: box
    initial: 200
  lora_tank_max_mm:
    name: LoRa Tank Max Distance (mm)
    min: 10
    max: 10000
    step: 10
    mode: box
    initial: 2000

script:
  lora_ping_node:
    alias: LoRa Ping Node
    mode: single
    sequence:
      - service: mqtt.publish
        data:
          topic: "lora2ha/node/{{ states('input_text.lora_target_node_id') }}/set"
          payload: '{"cmd":"ping"}'

  lora_reboot_node:
    alias: LoRa Reboot Node
    mode: single
    sequence:
      - service: mqtt.publish
        data:
          topic: "lora2ha/node/{{ states('input_text.lora_target_node_id') }}/set"
          payload: '{"cmd":"reboot"}'

  lora_set_interval_node:
    alias: LoRa Set Interval
    mode: single
    sequence:
      - variables:
          sec: "{{ states('input_number.lora_target_interval_sec') | int(300) }}"
      - service: mqtt.publish
        data:
          topic: "lora2ha/node/{{ states('input_text.lora_target_node_id') }}/set"
          payload: "{{ {'cmd':'set_param','param':'tx_interval_sec','value': sec} | tojson }}"

  lora_enter_ota_node:
    alias: LoRa Enter OTA
    mode: single
    sequence:
      - variables:
          sec: "{{ states('input_number.lora_ota_window_sec') | int(300) }}"
      - service: mqtt.publish
        data:
          topic: "lora2ha/node/{{ states('input_text.lora_target_node_id') }}/set"
          payload: "{{ {'cmd':'enter_ota','sec': sec} | tojson }}"

  lora_set_tank_area:
    alias: LoRa Set Tank Area
    mode: single
    sequence:
      - variables:
          area_m2: "{{ states('input_number.lora_tank_area_m2') | float(1.0) }}"
      - service: mqtt.publish
        data:
          topic: "lora2ha/node/{{ states('input_text.lora_target_node_id') }}/set"
          payload: "{{ {'cmd':'set_param','param':'tank_area_m2','value': area_m2} | tojson }}"

  lora_set_tank_min_mm:
    alias: LoRa Set Tank Min Distance
    mode: single
    sequence:
      - variables:
          min_mm: "{{ states('input_number.lora_tank_min_mm') | int(200) }}"
      - service: mqtt.publish
        data:
          topic: "lora2ha/node/{{ states('input_text.lora_target_node_id') }}/set"
          payload: "{{ {'cmd':'set_param','param':'tank_distance_min_mm','value': min_mm} | tojson }}"

  lora_set_tank_max_mm:
    alias: LoRa Set Tank Max Distance
    mode: single
    sequence:
      - variables:
          max_mm: "{{ states('input_number.lora_tank_max_mm') | int(2000) }}"
      - service: mqtt.publish
        data:
          topic: "lora2ha/node/{{ states('input_text.lora_target_node_id') }}/set"
          payload: "{{ {'cmd':'set_param','param':'tank_distance_max_mm','value': max_mm} | tojson }}"

mqtt:
  sensor:
    - name: "LoRa Last ACK"
      unique_id: lora_last_ack_payload
      state_topic: "lora2ha/node/+/ack"
      value_template: "{{ value_json.status | default(-1) }}"
      json_attributes_topic: "lora2ha/node/+/ack"

automation:
  - id: lora_ack_notification
    alias: LoRa ACK Notification
    mode: queued
    trigger:
      - platform: mqtt
        topic: "lora2ha/node/+/ack"
    action:
      - variables:
          data: "{{ trigger.payload_json if trigger.payload_json is defined else {} }}"
          node_id: "{{ data.node_id | default('unknown') }}"
          op: "{{ data.op | default('n/a') }}"
          param: "{{ data.param | default('n/a') }}"
          status: "{{ data.status | default('n/a') }}"
          interval_sec: "{{ data.interval_sec | default('n/a') }}"
      - service: persistent_notification.create
        data:
          title: "LoRa ACK node {{ node_id }}"
          message: "op={{ op }}, param={{ param }}, status={{ status }}, interval={{ interval_sec }}s"
