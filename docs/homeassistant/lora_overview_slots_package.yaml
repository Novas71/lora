  - binary_sensor:
      - name: "LoRa Slot 1 Stale"
        unique_id: lora_slot1_stale
        state: >
          {% set node = states('input_text.lora_overview_node_1') | trim %}
          {{ is_state('binary_sensor.lora_' ~ node ~ '_stale', 'on') }}
      - name: "LoRa Slot 1 Low Battery"
        unique_id: lora_slot1_low_battery
        state: >
          {% set node = states('input_text.lora_overview_node_1') | trim %}
