title: LoRa Multi-Node Controls
type: vertical-stack
cards:
  - type: markdown
    content: |
      ## LoRa Multi-Node Control
      Tento dashboard používá stejný `input_text.lora_target_node_id` + skripty,
      takže před kliknutím na tlačítko nastav cílové `Node ID` v horním panelu.

  - type: entities
    title: Target Selector
    entities:
      - entity: input_text.lora_target_node_id
        name: Active Node ID
      - entity: input_number.lora_target_interval_sec
        name: Interval sec
      - entity: input_number.lora_ota_window_sec
        name: OTA window sec
      - entity: input_number.lora_tank_area_m2
        name: Tank area m²
      - entity: input_number.lora_tank_min_mm
        name: Tank min mm
      - entity: input_number.lora_tank_max_mm
        name: Tank max mm

  - type: horizontal-stack
    cards:
      - type: button
        name: Set Tank Area
        icon: mdi:vector-square
        tap_action:
          action: call-service
          service: script.lora_set_tank_area
      - type: button
        name: Set Tank Min
        icon: mdi:arrow-collapse-down
        tap_action:
          action: call-service
          service: script.lora_set_tank_min_mm
      - type: button
        name: Set Tank Max
        icon: mdi:arrow-collapse-up
        tap_action:
          action: call-service
          service: script.lora_set_tank_max_mm

  - type: entities
    title: Tank Metrics (example node 2001)
    entities:
      - entity: sensor.lora_2001_distance_cm
        name: Distance (cm)
      - entity: sensor.lora_2001_level_cm
        name: Water level (cm)
      - entity: sensor.lora_2001_water_l
        name: Water volume (L)

  - type: grid
    title: Quick Actions (Node 2001 / 2002 / 2003)
    columns: 3
    square: false
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: "### Node 2001"
          - type: button
            name: Select 2001
            icon: mdi:numeric-1-circle
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.lora_target_node_id
                value: "2001"
          - type: horizontal-stack
            cards:
              - type: button
                name: Ping
                icon: mdi:wifi-check
                tap_action:
                  action: call-service
                  service: script.lora_ping_node
              - type: button
                name: Reboot
                icon: mdi:restart
                tap_action:
                  action: call-service
                  service: script.lora_reboot_node
          - type: button
            name: Set Interval
            icon: mdi:timer-cog
            tap_action:
              action: call-service
              service: script.lora_set_interval_node
          - type: button
            name: Enter OTA
            icon: mdi:upload-network
            tap_action:
              action: call-service
              service: script.lora_enter_ota_node

      - type: vertical-stack
        cards:
          - type: markdown
            content: "### Node 2002"
          - type: button
            name: Select 2002
            icon: mdi:numeric-2-circle
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.lora_target_node_id
                value: "2002"
          - type: horizontal-stack
            cards:
              - type: button
                name: Ping
                icon: mdi:wifi-check
                tap_action:
                  action: call-service
                  service: script.lora_ping_node
              - type: button
                name: Reboot
                icon: mdi:restart
                tap_action:
                  action: call-service
                  service: script.lora_reboot_node
          - type: button
            name: Set Interval
            icon: mdi:timer-cog
            tap_action:
              action: call-service
              service: script.lora_set_interval_node
          - type: button
            name: Enter OTA
            icon: mdi:upload-network
            tap_action:
              action: call-service
              service: script.lora_enter_ota_node

      - type: vertical-stack
        cards:
          - type: markdown
            content: "### Node 2003"
          - type: button
            name: Select 2003
            icon: mdi:numeric-3-circle
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.lora_target_node_id
                value: "2003"
          - type: horizontal-stack
            cards:
              - type: button
                name: Ping
                icon: mdi:wifi-check
                tap_action:
                  action: call-service
                  service: script.lora_ping_node
              - type: button
                name: Reboot
                icon: mdi:restart
                tap_action:
                  action: call-service
                  service: script.lora_reboot_node
          - type: button
            name: Set Interval
            icon: mdi:timer-cog
            tap_action:
              action: call-service
              service: script.lora_set_interval_node
          - type: button
            name: Enter OTA
            icon: mdi:upload-network
            tap_action:
              action: call-service
              service: script.lora_enter_ota_node

  - type: entities
    title: Last ACK
    entities:
      - entity: sensor.lora_last_ack
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: node_id
        name: Node
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: cmd
        name: Cmd
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: status
        name: Status
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: interval_sec
        name: Interval
