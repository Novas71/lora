title: LoRa Multi-Node Controls
type: vertical-stack
cards:
  - type: markdown
    content: |
      ## LoRa Multi-Node Control
      Tento dashboard používá stejný `input_text.lora_target_node_id` + skripty,
      takže před kliknutím na tlačítko nastav cílové `Node ID` v horním panelu.

  - type: entities
    title: Target Selector
    entities:
      - entity: input_text.lora_target_node_id
        name: Active Node ID
      - entity: input_number.lora_target_interval_sec
        name: Interval sec
      - entity: input_number.lora_ota_window_sec
        name: OTA window sec
      - entity: input_number.lora_tank_area_m2
        name: Tank area m²
      - entity: input_number.lora_tank_min_mm
        name: Tank min mm
      - entity: input_number.lora_tank_max_mm
        name: Tank max mm
      - entity: input_number.lora_attr_cluster_id
        name: Attr cluster ID
      - entity: input_number.lora_attr_id
        name: Attr ID
      - entity: input_number.lora_attr_value
        name: Attr value (int32)
      - entity: input_text.lora_group_name
        name: Group name
      - entity: input_number.lora_bind_src_cluster
        name: Bind src cluster
      - entity: input_number.lora_bind_src_attr
        name: Bind src attr
      - entity: input_number.lora_bind_dst_node
        name: Bind dst node
      - entity: input_number.lora_bind_dst_cluster
        name: Bind dst cluster
      - entity: input_number.lora_bind_dst_attr
        name: Bind dst attr
      - entity: input_number.lora_bind_scale
        name: Bind scale
      - entity: input_number.lora_bind_offset
        name: Bind offset

  - type: horizontal-stack
    cards:
      - type: button
        name: Set Tank Area
        icon: mdi:vector-square
        tap_action:
          action: call-service
          service: script.lora_set_tank_area
      - type: button
        name: Set Tank Min
        icon: mdi:arrow-collapse-down
        tap_action:
          action: call-service
          service: script.lora_set_tank_min_mm
      - type: button
        name: Set Tank Max
        icon: mdi:arrow-collapse-up
        tap_action:
          action: call-service
          service: script.lora_set_tank_max_mm

  - type: horizontal-stack
    cards:
      - type: button
        name: Read Attr
        icon: mdi:database-search
        tap_action:
          action: call-service
          service: script.lora_attr_read_node
      - type: button
        name: Write Attr
        icon: mdi:database-edit
        tap_action:
          action: call-service
          service: script.lora_attr_write_node
      - type: button
        name: Write Interval Attr
        icon: mdi:timer-cog-outline
        tap_action:
          action: call-service
          service: script.lora_attr_write_interval

  - type: horizontal-stack
    cards:
      - type: button
        name: Read Tank Area Attr
        icon: mdi:database-search
        tap_action:
          action: call-service
          service: script.lora_attr_read_tank_area
      - type: button
        name: Read Tank Min Attr
        icon: mdi:arrow-collapse-down
        tap_action:
          action: call-service
          service: script.lora_attr_read_tank_min
      - type: button
        name: Read Tank Max Attr
        icon: mdi:arrow-collapse-up
        tap_action:
          action: call-service
          service: script.lora_attr_read_tank_max

  - type: horizontal-stack
    cards:
      - type: button
        name: Write Tank Area Attr
        icon: mdi:vector-square-edit
        tap_action:
          action: call-service
          service: script.lora_attr_write_tank_area
      - type: button
        name: Write Tank Min Attr
        icon: mdi:arrow-collapse-down
        tap_action:
          action: call-service
          service: script.lora_attr_write_tank_min
      - type: button
        name: Write Tank Max Attr
        icon: mdi:arrow-collapse-up
        tap_action:
          action: call-service
          service: script.lora_attr_write_tank_max

  - type: horizontal-stack
    cards:
      - type: button
        name: Group Add
        icon: mdi:account-multiple-plus
        tap_action:
          action: call-service
          service: script.lora_group_add_node
      - type: button
        name: Group Remove
        icon: mdi:account-multiple-remove
        tap_action:
          action: call-service
          service: script.lora_group_remove_node
      - type: button
        name: Group List
        icon: mdi:format-list-bulleted
        tap_action:
          action: call-service
          service: script.lora_group_list_node
      - type: button
        name: Group Clear
        icon: mdi:broom
        tap_action:
          action: call-service
          service: script.lora_group_clear_node

  - type: horizontal-stack
    cards:
      - type: button
        name: Group Read Attr
        icon: mdi:database-search
        tap_action:
          action: call-service
          service: script.lora_attr_read_group
      - type: button
        name: Group Write Attr
        icon: mdi:database-edit
        tap_action:
          action: call-service
          service: script.lora_attr_write_group

  - type: horizontal-stack
    cards:
      - type: button
        name: Bind Add
        icon: mdi:link-plus
        tap_action:
          action: call-service
          service: script.lora_bind_attr_add
      - type: button
        name: Bind Remove
        icon: mdi:link-off
        tap_action:
          action: call-service
          service: script.lora_bind_attr_remove
      - type: button
        name: Bind List
        icon: mdi:link-variant
        tap_action:
          action: call-service
          service: script.lora_bind_attr_list

  - type: entities
    title: Tank Metrics (example node 2001)
    entities:
      - entity: sensor.lora_2001_distance_cm
        name: Distance (cm)
      - entity: sensor.lora_2001_level_cm
        name: Water level (cm)
      - entity: sensor.lora_2001_water_l
        name: Water volume (L)

  - type: grid
    title: Quick Actions (Node 2001 / 2002 / 2003)
    columns: 3
    square: false
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: "### Node 2001"
          - type: button
            name: Select 2001
            icon: mdi:numeric-1-circle
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.lora_target_node_id
                value: "2001"
          - type: horizontal-stack
            cards:
              - type: button
                name: Ping
                icon: mdi:wifi-check
                tap_action:
                  action: call-service
                  service: script.lora_ping_node
              - type: button
                name: Reboot
                icon: mdi:restart
                tap_action:
                  action: call-service
                  service: script.lora_reboot_node
          - type: button
            name: Set Interval
            icon: mdi:timer-cog
            tap_action:
              action: call-service
              service: script.lora_set_interval_node
          - type: button
            name: Enter OTA
            icon: mdi:upload-network
            tap_action:
              action: call-service
              service: script.lora_enter_ota_node

      - type: vertical-stack
        cards:
          - type: markdown
            content: "### Node 2002"
          - type: button
            name: Select 2002
            icon: mdi:numeric-2-circle
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.lora_target_node_id
                value: "2002"
          - type: horizontal-stack
            cards:
              - type: button
                name: Ping
                icon: mdi:wifi-check
                tap_action:
                  action: call-service
                  service: script.lora_ping_node
              - type: button
                name: Reboot
                icon: mdi:restart
                tap_action:
                  action: call-service
                  service: script.lora_reboot_node
          - type: button
            name: Set Interval
            icon: mdi:timer-cog
            tap_action:
              action: call-service
              service: script.lora_set_interval_node
          - type: button
            name: Enter OTA
            icon: mdi:upload-network
            tap_action:
              action: call-service
              service: script.lora_enter_ota_node

      - type: vertical-stack
        cards:
          - type: markdown
            content: "### Node 2003"
          - type: button
            name: Select 2003
            icon: mdi:numeric-3-circle
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.lora_target_node_id
                value: "2003"
          - type: horizontal-stack
            cards:
              - type: button
                name: Ping
                icon: mdi:wifi-check
                tap_action:
                  action: call-service
                  service: script.lora_ping_node
              - type: button
                name: Reboot
                icon: mdi:restart
                tap_action:
                  action: call-service
                  service: script.lora_reboot_node
          - type: button
            name: Set Interval
            icon: mdi:timer-cog
            tap_action:
              action: call-service
              service: script.lora_set_interval_node
          - type: button
            name: Enter OTA
            icon: mdi:upload-network
            tap_action:
              action: call-service
              service: script.lora_enter_ota_node

  - type: entities
    title: Last ACK
    entities:
      - entity: sensor.lora_last_ack
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: node_id
        name: Node
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: op
        name: Operation
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: param
        name: Parameter
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: status
        name: Status
      - type: attribute
        entity: sensor.lora_last_ack
        attribute: interval_sec
        name: Interval
